<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vive Em Mim | Links</title>
    <meta
      name="description"
      content="Pagina de links da Vive Em Mim para site, WhatsApp, atendimento e redes sociais."
    />
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="favicon-32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="favicon-16.png" sizes="16x16" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="profile" aria-label="Perfil e links principais">
        <div class="logo-frame">
          <img
            src="Imagens/Logo.jpg"
            alt="Logo Vive Em Mim"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='grid';"
          />
          <span aria-hidden="true">Sua logo</span>
        </div>

        <p class="eyebrow">Bem-vindo</p>
        <h1>Vive Em Mim</h1>
        <p class="bio">
          Encontre aqui nossos canais oficiais, atendimento e novidades.
        </p>

        <nav class="links" aria-label="Links">
          <a
            class="link primary"
            href="https://viveemmim.meloja.com.br"
            target="_blank"
            rel="noreferrer"
          >
            <span class="icon" aria-hidden="true">
              <img src="Imagens/icons8-loja-online-100.png" alt="" />
            </span>
            <span>
              <strong>Site oficial</strong>
              <small>Compre pelo Site</small>
            </span>
          </a>

          <a
            class="link whatsapp"
            href="https://wa.me/5519996425274"
            target="_blank"
            rel="noreferrer"
          >
            <span class="icon" aria-hidden="true">
              <img src="Imagens/whatsapp.png" alt="" />
            </span>
            <span>
              <strong>WhatsApp</strong>
              <small>Compre pelo WhatsApp</small>
            </span>
          </a>

          <a
            class="link instagram"
            href="https://www.instagram.com/viveemmim.camisetacatolica?igsh=ZXNncDY5ajVrdHNk"
            target="_blank"
            rel="noreferrer"
          >
            <span class="icon" aria-hidden="true">
              <img src="Imagens/instagram.png" alt="" />
            </span>
            <span>
              <strong>Instagram</strong>
              <small>Visite nosso Instagram</small>
            </span>
          </a>
        </nav>

        <footer>
          <p>@viveemmim.camisetacatolica</p>
        </footer>
      </section>
    </main>
  </body>
</html>

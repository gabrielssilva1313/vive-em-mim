<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vive em Mim | Links</title>
    <meta
      name="description"
      content="Pagina de links da Vive em Mim para site, WhatsApp, catalogo e redes sociais."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="profile" aria-label="Perfil e links principais">
        <div class="logo-frame">
          <img
            src="Imagens/Logo.jpg"
            alt="Logo Vive em Mim"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='grid';"
          />
          <span aria-hidden="true">Sua logo</span>
        </div>

        <p class="eyebrow">Bem-vindo</p>
        <h1>Vive em Mim</h1>
        <p class="bio">
          Encontre aqui nossos canais oficiais, cat&aacute;logo, atendimento e novidades.
        </p>

        <nav class="links" aria-label="Links">
          <a
            class="link primary"
            href="https://viveemmim.meloja.com.br"
            target="_blank"
            rel="noreferrer"
          >
            <span class="icon" aria-hidden="true">
              <img src="Imagens/logo-site-icon.png" alt="" />
            </span>
            <span>
              <strong>Site oficial</strong>
              <small>Conhe&ccedil;a nossa loja</small>
            </span>
          </a>

          <a
            class="link whatsapp"
            href="https://wa.me/5519996425274"
            target="_blank"
            rel="noreferrer"
          >
            <span class="icon" aria-hidden="true">
              <img src="Imagens/whatsapp.png" alt="" />
            </span>
            <span>
              <strong>WhatsApp</strong>
              <small>Fale com a gente</small>
            </span>
          </a>

          <a class="link" href="catalogo.pdf" target="_blank" rel="noreferrer">
            <span class="icon" aria-hidden="true">PDF</span>
            <span>
              <strong>Cat&aacute;logo</strong>
              <small>Veja produtos e servi&ccedil;os</small>
            </span>
          </a>

          <a
            class="link instagram"
            href="https://www.instagram.com/viveemmim.camisetacatolica?igsh=ZXNncDY5ajVrdHNk"
            target="_blank"
            rel="noreferrer"
          >
            <span class="icon" aria-hidden="true">
              <img src="Imagens/instagram.png" alt="" />
            </span>
            <span>
              <strong>Instagram</strong>
              <small>Acompanhe as novidades</small>
            </span>
          </a>
        </nav>

        <footer>
          <p>@vivemmim</p>
        </footer>
      </section>
    </main>
  </body>
</html>
